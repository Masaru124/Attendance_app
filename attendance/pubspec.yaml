name: attendance
description: "Smart Attendance System with Leave Management"
# Prevent publishing to pub.dev
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Core Flutter packages
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.2.3

  # State Management - Riverpod
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Firebase Core
  firebase_core: ^4.4.0

  # Firebase Messaging for Push Notifications
  firebase_messaging: ^16.1.1

  # Firebase Auth for Authentication
  firebase_auth: ^6.1.4

  # Date and Time formatting
  intl: ^0.20.2

  # UUID for unique IDs
  uuid: ^4.4.0

  # Environment variables
  flutter_dotenv: ^6.0.0

  # QR Code Scanner
  mobile_scanner: ^7.2.0

  # QR Code Generation
  qr_flutter: ^4.1.0

  # Permission Handler
  permission_handler: ^12.0.1

  # Camera for face capture
  camera: ^0.11.4

  # Geolocator for GPS location
  geolocator: ^14.0.2

  # App Settings to open device settings
  app_settings: ^7.0.0

  # Google ML Kit Face Detection
  google_mlkit_face_detection: ^0.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Riverpod code generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.7.6

flutter:
  uses-material-design: true

  # Assets folder
  assets:
    - assets/
    - .env
